version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Next 16 requires Node >= 20.9; Amplify's default image ships older Node.
        - nvm install 20
        - nvm use 20
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    # Next.js static export output (output: "export" in next.config.ts).
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
