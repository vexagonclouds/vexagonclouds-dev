version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    # Next.js static export output (output: "export" in next.config.ts).
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
