<!-- Proxy Papers lockup — P-mark + "Proxy" / "Papers" wordmark.
     The single source of truth for the brand lockup geometry. Parts are classed so a
     host can recolor per theme: on the blue onboarding the whole lockup is Bone White
     (mark blade included); on dark/light surfaces the blade flips to Proxy Blue.
     Self-contained defaults below keep it correct when used as a plain <img>. -->
<svg viewBox="0 0 783 310" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Proxy Papers">
  <style>
    .lk-mark__stem, .lk-word { fill: var(--pp-lockup-ink, #f7f4f0); }
    .lk-mark__blade { fill: var(--pp-lockup-blade, #f7f4f0); }
  </style>

  <!-- P-mark -->
  <g class="lk-mark">
